// ---------------- LOGIN ----------------
function showLogin() {
  document.getElementById('login').innerHTML = `
    <input id="code" placeholder="Enter your code" />
    <button onclick="login()">Join</button>
  `;
}

async function login() {
  const code = document.getElementById('code').value.toUpperCase();

  const { data } = await supabase
    .from('users')
    .select('*')
    .eq('code', code)
    .single();

  if (!data) return alert('Invalid code');

  user = data;
  localStorage.setItem('user', JSON.stringify(user));
  startApp();
}

function loadUser() {
  const u = localStorage.getItem('user');
  if (u) user = JSON.parse(u);
}

// ---------------- DATA ----------------
async function loadMatches() {
  const { data } = await supabase.from('matches').select('*').order('match_time');
  return data;
}

async function loadPredictions() {
  const { data } = await supabase.from('predictions').select('*');
  return data;
}

// ---------------- PICK ----------------
async function submitPick(match_id, team) {
  await supabase.from('predictions').upsert({ user_id:user.id, match_id, team });
  render();
}

function isLocked(time) {
  return new Date() >= new Date(time);
}

// ---------------- LEADERBOARD ----------------
function calculateLeaderboard(users, preds, matches) {
  const scores = {};
  users.forEach(u => scores[u.id] = { name:u.name, pts:0 });

  preds.forEach(p => {
    const match = matches.find(m=>m.id===p.match_id);
    if (!match || !match.result) return;
    if (p.team===match.result) scores[p.user_id].pts +=10;
    else scores[p.user_id].pts -=5;
  });

  return Object.values(scores).sort((a,b)=>b.pts-a.pts);
}

async function renderLeaderboard() {
  const { data:users } = await supabase.from('users').select('*');
  const preds = await loadPredictions();
  const matches = await loadMatches();

  const board = calculateLeaderboard(users, preds, matches);

  document.getElementById('leaderboard').innerHTML = `
    <h3>Leaderboard</h3>
    ${board.map((u,i)=>`<div>${i+1}. ${u.name} — ${u.pts}</div>`).join('')}
  `;
}

// ---------------- RENDER ----------------
async function render() {
  const matches = await loadMatches();
  const preds = await loadPredictions();

  document.getElementById('app').innerHTML = matches.map(m=>{
    const locked = isLocked(m.match_time);
    const myPick = preds.find(p=>p.match_id===m.id && p.user_id===user.id);

    return `
      <div class="card">
        <b>${m.team1_name} vs ${m.team2_name}</b><br>
        ${new Date(m.match_time).toLocaleString()}<br><br>
        ${locked ? '🔒 Locked' : `
          <button onclick="submitPick('${m.id}','${m.team1}')">${m.team1}</button>
          <button onclick="submitPick('${m.id}','${m.team2}')">${m.team2}</button>
        `}
        <div>Your Pick: ${myPick?myPick.team:'-'}</div>
      </div>
    `;
  }).join('');

  renderLeaderboard();
}

function startApp() {
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

// ---------------- INIT ----------------
